<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      property="og:image"
      content="https://camo.githubusercontent.com/cc0b6a3547991fa106f7265c07b3793bdea083130f91d68497347a6adc5085f9/68747470733a2f2f74656c656772612e70682f66696c652f3464313234343030623938356232666536656531632e6a7067"
      itemprop="thumbnailUrl"
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ heading }}</title>
    <link rel="stylesheet" type="text/css" href="/static/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Raleway"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Delius"
    />
    <link rel="stylesheet" href="https://cdn.plyr.io/3.5.6/plyr.css" />
  </head>

  <body>
    <div class="player-container">
      <{{ tag }} src="{{ src }}" class="player"></{{ tag }}>
      <div class="info-panel">
        <h2>{{ file_name }}</h2>
        <p class="player-hint">Player not working? Open the stream in VLC or copy the URL.</p>
        <div class="buttons">
          <a class="ext-button vlc" href="vlc://{{ src }}">▶ Open in VLC</a>
          <a class="ext-button download" href="{{ src }}" download>⬇ Download</a>
          <button class="ext-button copy" type="button" data-stream-url="{{ src }}">⧉ Copy URL</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/darkmode-js@1.5.7/lib/darkmode-js.min.js"></script>
    <script>
      const settings = {
        controls: [
          "play-large",
          "rewind",
          "play",
          "fast-forward",
          "progress",
          "current-time",
          "duration",
          "mute",
          "volume",
          "captions",
          "settings",
          "pip",
          "airplay",
          "download",
          "fullscreen",
        ],
        keyboard: {
          focused: true,
          global: true,
        },
      };
      document.addEventListener("DOMContentLoaded", () => {
        const player = Plyr.setup(".player", settings);

        const copyBtn = document.querySelector(".ext-button.copy");
        if (copyBtn) {
          copyBtn.addEventListener("click", async () => {
            const url = copyBtn.dataset.streamUrl;
            const original = copyBtn.textContent;
            try {
              await navigator.clipboard.writeText(url);
              copyBtn.textContent = "✓ Copied";
            } catch (err) {
              // Fallback for non-secure contexts / older Safari
              const ta = document.createElement("textarea");
              ta.value = url;
              document.body.appendChild(ta);
              ta.select();
              try { document.execCommand("copy"); copyBtn.textContent = "✓ Copied"; }
              catch (_) { copyBtn.textContent = "✗ Copy failed"; }
              document.body.removeChild(ta);
            }
            setTimeout(() => { copyBtn.textContent = original; }, 2000);
          });
        }
      });

      const options = {
        label: "🌓",
      };

      function addDarkmodeWidget() {
        new Darkmode(options).showWidget();
      }
      window.addEventListener("load", addDarkmodeWidget);
    </script>
  </body>
</html>
