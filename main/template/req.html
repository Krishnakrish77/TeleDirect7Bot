<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      property="og:image"
      content="https://camo.githubusercontent.com/cc0b6a3547991fa106f7265c07b3793bdea083130f91d68497347a6adc5085f9/68747470733a2f2f74656c656772612e70682f66696c652f3464313234343030623938356232666536656531632e6a7067"
      itemprop="thumbnailUrl"
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ heading }}</title>
    <link rel="stylesheet" type="text/css" href="/static/style.css?v=3" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Raleway"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Delius"
    />
    <link rel="stylesheet" href="https://cdn.plyr.io/3.5.6/plyr.css" />
  </head>

  <body>
    <div class="player-container">
      <{{ tag }} src="{{ src }}" class="player"></{{ tag }}>
      <div class="info-panel">
        <h2>{{ file_name }}</h2>
        <p class="player-hint">Player not working? Open the stream in VLC.</p>
        <div class="buttons">
          <a class="ext-button vlc" href="vlc://{{ src }}" data-stream-url="{{ src }}">
            <span class="ext-button__icon" aria-hidden="true">▶</span>
            <span class="ext-button__label">Open in VLC</span>
          </a>
        </div>
      </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/darkmode-js@1.5.7/lib/darkmode-js.min.js"></script>
    <script>
      const settings = {
        controls: [
          "play-large",
          "rewind",
          "play",
          "fast-forward",
          "progress",
          "current-time",
          "duration",
          "mute",
          "volume",
          "captions",
          "settings",
          "pip",
          "airplay",
          "download",
          "fullscreen",
        ],
        keyboard: {
          focused: true,
          global: true,
        },
      };
      function buildVlcUrl(streamUrl) {
        const ua = navigator.userAgent || "";
        if (/Android/i.test(ua)) {
          // VLC for Android handles the standard Android Intent URL scheme.
          // The url-without-scheme + #Intent fragment routes to org.videolan.vlc.
          const scheme = streamUrl.startsWith("https://") ? "https" : "http";
          const stripped = streamUrl.replace(/^https?:\/\//, "");
          return `intent://${stripped}#Intent;scheme=${scheme};package=org.videolan.vlc;type=video/*;end`;
        }
        if (/iPad|iPhone|iPod/.test(ua)) {
          // iOS VLC documents vlc-x-callback as the official scheme.
          return `vlc-x-callback://x-callback-url/stream?url=${encodeURIComponent(streamUrl)}`;
        }
        // Desktop fallback: vlc:// works on Windows (registered by installer),
        // and is the closest thing on Linux. macOS users may need to open
        // the URL manually via VLC > File > Open Network.
        return `vlc://${streamUrl}`;
      }

      document.addEventListener("DOMContentLoaded", () => {
        const player = Plyr.setup(".player", settings);

        const vlcBtn = document.querySelector(".ext-button.vlc");
        if (vlcBtn && vlcBtn.dataset.streamUrl) {
          vlcBtn.href = buildVlcUrl(vlcBtn.dataset.streamUrl);
        }
      });

      const options = {
        label: "🌓",
      };

      function addDarkmodeWidget() {
        new Darkmode(options).showWidget();
      }
      window.addEventListener("load", addDarkmodeWidget);
    </script>
  </body>
</html>
