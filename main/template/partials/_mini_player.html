    {# Persistent background audio — must appear BEFORE the inline <script> below
       so getElementById('bgAudio') finds it at script execution time.
       hx-preserve keeps the same DOM node across htmx content swaps. #}
    <audio id="bgAudio"
           hx-preserve="true"
           preload="none"
           playsinline
           style="position:absolute;width:0;height:0;pointer-events:none">
    </audio>
    {# Second audio element — pre-buffers the next track for gapless playback #}
    <audio id="bgAudio2"
           hx-preserve="true"
           preload="none"
           playsinline
           style="position:absolute;width:0;height:0;pointer-events:none">
    </audio>

    {# Queue action toast — briefly confirms Play next / Add to queue #}
    <div id="_queue-toast"
         style="position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(6px);
                background:#1f2227;border:1px solid rgba(255,255,255,0.1);border-radius:8px;
                padding:7px 14px;font-size:13px;color:#fff;opacity:0;z-index:9001;
                transition:opacity 0.2s,transform 0.2s;pointer-events:none;
                white-space:nowrap;max-width:80vw;overflow:hidden;text-overflow:ellipsis">
    </div>

    {# ── Mini-player bar ─────────────────────────────────────────────────
       Shown on every page EXCEPT the watch page itself when the user has
       played an audio track. Reads from localStorage td:nowplaying so
       the bar persists across navigation — like Spotify's bottom bar. #}
    <div id="_mini-player" style="display:none"
         class="fixed bottom-0 left-0 right-0 z-40
                bg-ink-950/95 backdrop-blur-md border-t border-white/10
                px-4 py-2.5 flex items-center gap-3 shadow-2xl">
      {# Progress bar — seekable. Tall touch target, thin visual rail. #}
      <div id="_mp-seek"
           style="position:absolute;top:0;left:0;right:0;height:12px;cursor:pointer;padding-top:0;z-index:1"
           title="Seek">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.06);transition:height 0.15s"
             id="_mp-seek-track">
          <div id="_mp-progress" style="height:100%;width:0%;background:#f97316;transition:width 0.2s linear;pointer-events:none"></div>
        </div>
      </div>
      {# Album art + track info — tap to go to player #}
      <a id="_mp-link" href="#"
         class="flex items-center gap-3 flex-1 min-w-0 group">
        <div class="w-10 h-10 rounded-lg overflow-hidden flex-shrink-0 bg-ink-800">
          <img id="_mp-art" alt=""
               onerror="this.style.display='none'"
               class="w-full h-full object-cover" />
        </div>
        <div class="min-w-0 flex-1">
          <p id="_mp-title"
             class="text-sm font-semibold text-white truncate
                    group-hover:text-brand-300 transition-colors"></p>
          <p id="_mp-artist" class="text-xs text-slate-400 truncate"></p>
        </div>
      </a>
      {# Controls: Prev · Play · Next #}
      <div class="flex items-center gap-2 flex-shrink-0">
        <button id="_mp-prev"
                class="w-10 h-10 flex items-center justify-center rounded-full
                       text-slate-400 hover:text-white transition-colors"
                aria-label="Previous" onclick="window._mpNav && window._mpNav('prev')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
          </svg>
        </button>
        <button id="_mp-play"
                class="w-11 h-11 flex items-center justify-center rounded-full
                       bg-white text-ink-900 hover:bg-slate-200 transition-colors"
                aria-label="Play" onclick="window._mpTogglePlay && window._mpTogglePlay()">
          <svg id="_mp-icon-play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="_mp-icon-pause" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 hidden">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        <button id="_mp-next"
                class="w-10 h-10 flex items-center justify-center rounded-full
                       text-slate-400 hover:text-white transition-colors"
                aria-label="Next" onclick="window._mpNav && window._mpNav('next')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>
      </div>
      {# Time display — current / total #}
      <span id="_mp-time" class="text-[11px] tabular-nums text-slate-500 flex-shrink-0 hidden sm:block"></span>
      {# Dismiss #}
      <button onclick="window._mpDismiss && window._mpDismiss()"
              class="flex-shrink-0 text-slate-500 hover:text-white
                     transition-colors p-2" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <script>
(function () {
  // ── htmx loading bar ─────────────────────────────────────────────────────
  var _hbar = document.getElementById('_htmx-bar');
  if (_hbar) {
    function _hbarDone() {
      _hbar.classList.remove('htmx-request');
      _hbar.classList.add('htmx-complete');
      setTimeout(function() { _hbar.classList.remove('htmx-complete'); }, 500);
    }
    document.body.addEventListener('htmx:beforeRequest', function() {
      _hbar.classList.remove('htmx-complete');
      _hbar.classList.add('htmx-request');
    });
    document.body.addEventListener('htmx:afterSettle', _hbarDone);
    document.body.addEventListener('htmx:responseError', _hbarDone);
    document.body.addEventListener('htmx:sendError', _hbarDone);
  }

  // Scroll-to-top button
  var _st = document.getElementById('_scroll-top');
  if (_st) {
    window.addEventListener('scroll', function () {
      _st.style.display = window.scrollY > 300 ? 'grid' : 'none';
    }, { passive: true });
  }

  // ── Persistent background audio + mini-player ──────────────────────────
  var NP_KEY = 'td:nowplaying';
  var _bgAudio = document.getElementById('bgAudio');
  // Second element for gapless: pre-buffers next track; _bgAudio and _bgBuf
  // are swapped after crossfade so all closures always use the active element.
  var _bgBuf = document.getElementById('bgAudio2');

  // ── Gapless + crossfade state ──────────────────────────────────────────
  var _PRELOAD_AT = 30;   // seconds before end: start buffering next track
  var _XFADE_SECS = 3;    // crossfade duration in seconds
  var _xfading    = false;
  var _preloaded  = false;

  function _nextSrc() {
    // Returns the stream URL of the next track from queue or NP metadata
    try {
      var q  = JSON.parse(sessionStorage.getItem('td:queue') || 'null');
      var qi = parseInt(sessionStorage.getItem('td:queueIndex') || '-1', 10);
      if (q && qi >= 0 && qi + 1 < q.length) return q[qi + 1].streamUrl;
      var np = JSON.parse(localStorage.getItem(NP_KEY) || 'null');
      return (np && np.nextStreamUrl) || null;
    } catch(_) { return null; }
  }

  function _gapPreload() {
    if (_preloaded || !_bgBuf) return;
    var src = _nextSrc();
    if (!src) return;
    _bgBuf.src     = src;
    _bgBuf.preload = 'auto';
    _bgBuf.volume  = 0;
    _bgBuf.load();
    _preloaded = true;
  }

  function _gapCrossfade() {
    if (_xfading || !_bgBuf || !_bgBuf.src) return;
    _xfading = true;
    _bgBuf.currentTime = 0;
    _bgBuf.volume      = 0;
    _bgBuf.play().catch(function() { _xfading = false; });
    var t0 = performance.now(), origVol = _bgAudio.volume;
    (function _ramp() {
      var pct = Math.min(1, (performance.now() - t0) / (_XFADE_SECS * 1000));
      try { _bgAudio.volume = origVol * (1 - pct); } catch(_){}
      try { _bgBuf.volume   = pct; }                 catch(_){}
      if (pct < 1) requestAnimationFrame(_ramp);
    })();
  }

  // Swap active/buffer references after crossfade or normal track end
  function _gapSwap() {
    try { _bgAudio.pause(); _bgAudio.src = ''; _bgAudio.volume = 1; } catch(_){}
    var _old = _bgAudio;
    _bgAudio   = _bgBuf;
    _bgBuf     = _old;
    try { _bgAudio.volume = 1; } catch(_){}
    _xfading   = false;
    _preloaded = false;
  }

  // Sync play/pause icon in mini-player
  function _mpSyncIcon() {
    var iconPlay  = document.getElementById('_mp-icon-play');
    var iconPause = document.getElementById('_mp-icon-pause');
    if (!iconPlay || !iconPause) return;
    var playing = _bgAudio && !_bgAudio.paused;
    iconPlay.classList.toggle('hidden', playing);
    iconPause.classList.toggle('hidden', !playing);
  }

  // ── Media Session API — wires bgAudio to lock screen / headphone controls ──
  function _updateMediaSession(np) {
    if (!('mediaSession' in navigator) || !np) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title:  np.title  || '',
      artist: np.artist || '',
      artwork: np.art ? [{ src: np.art, sizes: '512x512', type: 'image/jpeg' }] : [],
    });
    navigator.mediaSession.setActionHandler('play',         () => { _bgAudio.play(); });
    navigator.mediaSession.setActionHandler('pause',        () => { _bgAudio.pause(); });
    navigator.mediaSession.setActionHandler('nexttrack',    () => { window._mpNav && window._mpNav('next'); });
    navigator.mediaSession.setActionHandler('previoustrack',() => { window._mpNav && window._mpNav('prev'); });
    navigator.mediaSession.setActionHandler('seekto', (d) => {
      if (_bgAudio && isFinite(d.seekTime)) _bgAudio.currentTime = d.seekTime;
    });
  }

  if (_bgAudio) {
    _bgAudio.addEventListener('play',  _mpSyncIcon);
    _bgAudio.addEventListener('pause', _mpSyncIcon);
    function _mpFmt(s) {
      if (!isFinite(s) || s < 0) return '0:00';
      var m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return m + ':' + String(sec).padStart(2, '0');
    }
    _bgAudio.addEventListener('timeupdate', function() {
      // Persist position so the watch page can resume from here
      if (_bgAudio.currentTime > 0) {
        try {
          var np = JSON.parse(localStorage.getItem(NP_KEY) || 'null');
          if (np) { np.position = Math.floor(_bgAudio.currentTime); localStorage.setItem(NP_KEY, JSON.stringify(np)); }
        } catch(_) {}
      }
      var bar = document.getElementById('_mp-progress');
      var timeEl = document.getElementById('_mp-time');
      var dur = _bgAudio.duration;
      var cur = _bgAudio.currentTime;
      var pct = dur > 0 ? (cur / dur * 100) : 0;
      if (bar) bar.style.width = pct.toFixed(1) + '%';
      if (timeEl && dur > 0) timeEl.textContent = _mpFmt(cur) + ' / ' + _mpFmt(dur);
      // Gapless: preload → crossfade
      if (isFinite(dur) && dur > 0) {
        var rem = dur - cur;
        if (!_preloaded && rem <= _PRELOAD_AT) _gapPreload();
        if (_preloaded && !_xfading && rem > 0 && rem <= _XFADE_SECS) _gapCrossfade();
      }
    });
    _bgAudio.addEventListener('ended', function() {
      // Gapless: if crossfade was in progress, _bgBuf is already playing at vol=1
      if (_xfading || (_preloaded && _bgBuf && !_bgBuf.paused && _bgBuf.currentTime > 0)) {
        _gapSwap();
        _mpInit();
        return;
      }
      _preloaded = false;
      // Primary: use the sessionStorage queue for accurate next-next metadata
      var queue = null, qIdx = -1;
      try {
        queue = JSON.parse(sessionStorage.getItem('td:queue') || 'null');
        qIdx  = parseInt(sessionStorage.getItem('td:queueIndex') || '-1', 10);
      } catch(_) {}

      if (queue && qIdx >= 0 && qIdx + 1 < queue.length) {
        var ni = qIdx + 1;
        var cur = queue[qIdx], nxt = queue[ni], aft = queue[ni + 1];
        var newNp = {
          url: nxt.watchUrl, streamUrl: nxt.streamUrl,
          title: nxt.title, artist: nxt.artist, art: nxt.art,
          nextUrl:       aft ? aft.watchUrl  : null,
          nextStreamUrl: aft ? aft.streamUrl : null,
          nextTitle:     aft ? aft.title     : null,
          nextArtist:    aft ? aft.artist    : null,
          nextArt:       aft ? aft.art       : null,
          prevUrl: cur.watchUrl, prevStreamUrl: cur.streamUrl,
        };
        try { localStorage.setItem(NP_KEY, JSON.stringify(newNp)); } catch(_) {}
        try { sessionStorage.setItem('td:queueIndex', String(ni)); } catch(_) {}
        _bgAudio.src = nxt.streamUrl;
        _bgAudio.play().catch(function() {});
        _mpInit();
        return;
      }

      // Fallback: np.nextStreamUrl (set from watch page npData)
      var np;
      try { np = JSON.parse(localStorage.getItem(NP_KEY) || 'null'); } catch(_) { np = null; }
      if (!np) return;
      if (np.nextStreamUrl) {
        var nextNp = {
          url: np.nextUrl, streamUrl: np.nextStreamUrl,
          title: np.nextTitle || '', artist: np.nextArtist || '', art: np.nextArt || '',
          nextUrl: null, nextStreamUrl: null,
          prevUrl: np.url, prevStreamUrl: np.streamUrl,
        };
        try { localStorage.setItem(NP_KEY, JSON.stringify(nextNp)); } catch(_) {}
        _bgAudio.src = np.nextStreamUrl;
        _bgAudio.play().catch(function() {});
        _mpInit();
      } else if (np.nextUrl) {
        window.location.href = np.nextUrl;
      }
    });
  }

  // ── Mirror play/pause events from buffer element so icon stays in sync ──
  if (_bgBuf) {
    _bgBuf.addEventListener('play',  _mpSyncIcon);
    _bgBuf.addEventListener('pause', _mpSyncIcon);
  }

  // ── Mini-player seek bar ───────────────────────────────────────────────
  var _mpSeek = document.getElementById('_mp-seek');
  var _mpSeekTrack = document.getElementById('_mp-seek-track');
  if (_mpSeek) {
    function _mpSeekTo(clientX) {
      var r = _mpSeek.getBoundingClientRect();
      var pct = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
      if (_bgAudio && isFinite(_bgAudio.duration) && _bgAudio.duration > 0) {
        _bgAudio.currentTime = pct * _bgAudio.duration;
      }
    }
    // Expand track height on hover/active for visual feedback
    _mpSeek.addEventListener('mouseenter', function() {
      if (_mpSeekTrack) _mpSeekTrack.style.height = '4px';
    });
    _mpSeek.addEventListener('mouseleave', function() {
      if (_mpSeekTrack) _mpSeekTrack.style.height = '2px';
    });
    // Click to seek
    _mpSeek.addEventListener('click', function(e) { _mpSeekTo(e.clientX); });
    // Touch drag to seek
    var _mpScrubbing = false;
    _mpSeek.addEventListener('touchstart', function(e) {
      if (e.touches.length !== 1) return;
      _mpScrubbing = true;
      _mpSeekTo(e.touches[0].clientX);
      e.preventDefault();
    }, { passive: false });
    _mpSeek.addEventListener('touchmove', function(e) {
      if (!_mpScrubbing || e.touches.length !== 1) return;
      _mpSeekTo(e.touches[0].clientX);
      e.preventDefault();
    }, { passive: false });
    _mpSeek.addEventListener('touchend', function() { _mpScrubbing = false; });
  }

  // Mini-player link: expand to watch page via htmx swap (bgAudio persists).
  // htmx.ajax bypasses the htmx:configRequest /watch/ exclusion — that
  // exclusion is for boost-style link navigations, not programmatic calls.
  var _mpLinkEl = document.getElementById('_mp-link');
  if (_mpLinkEl) {
    _mpLinkEl.addEventListener('click', function(e) {
      var np;
      try { np = JSON.parse(localStorage.getItem(NP_KEY) || 'null'); } catch(_) { np = null; }
      if (!np || !np.url || !_bgAudio) return; // fallback to default nav
      e.preventDefault();
      htmx.ajax('GET', np.url, {
        target: '#main-content',
        swap: 'outerHTML',
        select: '#main-content',
        pushUrl: np.url,
      });
    });
  }

  // Toggle play/pause on bgAudio
  window._mpTogglePlay = function() {
    if (!_bgAudio || !_bgAudio.src) {
      // No src yet — navigate to the last track so it loads
      var np;
      try { np = JSON.parse(localStorage.getItem(NP_KEY) || 'null'); } catch(_) { np = null; }
      if (np && np.url) window.location.href = np.url;
      return;
    }
    if (_bgAudio.paused) {
      _bgAudio.play().catch(function() {});
    } else {
      _bgAudio.pause();
    }
  };

  // Prev/next: navigate to adjacent track URL (full navigation to watch page)
  window._mpNav = function(dir) {
    // Reset gapless state on manual skip
    _xfading = false; _preloaded = false;
    if (_bgBuf) { try { _bgBuf.pause(); _bgBuf.src = ''; _bgBuf.volume = 1; } catch(_){} }
    var np;
    try { np = JSON.parse(localStorage.getItem(NP_KEY) || 'null'); } catch(_) { np = null; }
    if (!np) return;
    var url = dir === 'prev' ? np.prevUrl : np.nextUrl;
    if (url) window.location.href = url;
  };

  function _mpInit() {
    // On the watch page: hide bar + reset padding (player is on the page itself).
    if (location.pathname.startsWith('/watch/')) {
      document.body.style.paddingBottom = '';
      var bar = document.getElementById('_mini-player');
      if (bar) bar.style.display = 'none';
      return;
    }
    var np;
    try { np = JSON.parse(localStorage.getItem(NP_KEY) || 'null'); } catch(_) { np = null; }
    if (!np) return;
    var bar  = document.getElementById('_mini-player');
    var art  = document.getElementById('_mp-art');
    var ttl  = document.getElementById('_mp-title');
    var art2 = document.getElementById('_mp-artist');
    var link = document.getElementById('_mp-link');
    var prev = document.getElementById('_mp-prev');
    var next = document.getElementById('_mp-next');
    if (np.art) art.src = np.art;
    ttl.textContent  = np.title  || '';
    art2.textContent = np.artist || '';
    link.href = np.url || '#';
    if (prev) { prev.style.opacity = np.prevUrl ? '1' : '0.3'; prev.style.pointerEvents = np.prevUrl ? '' : 'none'; }
    if (next) { next.style.opacity = np.nextUrl ? '1' : '0.3'; next.style.pointerEvents = np.nextUrl ? '' : 'none'; }
    bar.style.display = 'flex';
    var _mp = document.getElementById('_mini-player');
    document.body.style.paddingBottom = (_mp ? _mp.offsetHeight : 60) + 'px';
    _mpSyncIcon();
  }

  window._mpDismiss = function() {
    try { localStorage.removeItem(NP_KEY); } catch(_) {}
    if (_bgAudio) { _bgAudio.pause(); _bgAudio.src = ''; }
    var bar = document.getElementById('_mini-player');
    if (bar) bar.style.display = 'none';
    document.body.style.paddingBottom = '';
  };

  // Wrap _mpInit to call any page-specific callback registered as _onMpInit.
  // Pages that need to react to track changes (e.g. album page equalizer) set
  // window._onMpInit = myFn. Avoids override-timing issues with the scripts block.
  var _mpInitBase = _mpInit;
  _mpInit = function() {
    _mpInitBase();
    if (typeof window._onMpInit === 'function') window._onMpInit();
  };
  window._mpInit = _mpInit;
  window._updateMediaSession = _updateMediaSession;

  // Update Media Session whenever now-playing changes
  var _lastNpUrl = null;
  var _mpInitOrig = _mpInit;
  _mpInit = window._mpInit = function() {
    _mpInitOrig();
    var np; try { np = JSON.parse(localStorage.getItem(NP_KEY) || 'null'); } catch(_) { np = null; }
    if (np && np.url !== _lastNpUrl) { _lastNpUrl = np.url; _updateMediaSession(np); }
  };

  // Play a standalone audio track directly via bgAudio from any page card.
  // Used by _card.html for audio HubItem cards in the library grid/shelves.
  window._cardPlayAudio = function(streamUrl, watchUrl, title, artist, art) {
    if (!_bgAudio) { window.location.href = watchUrl; return; }
    // Reset gapless state when starting a new track manually
    _xfading = false; _preloaded = false;
    if (_bgBuf) { try { _bgBuf.pause(); _bgBuf.src = ''; _bgBuf.volume = 1; } catch(_){} }
    _bgAudio.src = streamUrl;
    _bgAudio.play().then(function() {
      var np = { url: watchUrl, streamUrl: streamUrl, title: title,
                 artist: artist, art: art, nextUrl: null, nextStreamUrl: null,
                 prevUrl: null, prevStreamUrl: null };
      try { localStorage.setItem('td:nowplaying', JSON.stringify(np)); } catch(_) {}
      _mpInit();
    }).catch(function() {
      window.location.href = watchUrl;
    });
  };
  _mpInit();

  // ── Manual queue helpers ───────────────────────────────────────────────
  function _queueToast(msg) {
    var el = document.getElementById('_queue-toast');
    if (!el) return;
    el.textContent = msg;
    el.style.opacity = '1'; el.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(el._t);
    el._t = setTimeout(function() {
      el.style.opacity = '0'; el.style.transform = 'translateX(-50%) translateY(6px)';
    }, 2000);
  }

  // Insert track right after the current playing position
  window._queuePlayNext = function(track) {
    var q = null, qi = -1;
    try {
      q  = JSON.parse(sessionStorage.getItem('td:queue') || 'null');
      qi = parseInt(sessionStorage.getItem('td:queueIndex') || '-1', 10);
    } catch(_) {}
    if (!q || qi < 0 || !_bgAudio || !_bgAudio.src) {
      // Nothing playing — start immediately
      if (window._cardPlayAudio) window._cardPlayAudio(track.streamUrl, track.watchUrl, track.title, track.artist || '', track.art || '');
      return;
    }
    q.splice(qi + 1, 0, track);
    try { sessionStorage.setItem('td:queue', JSON.stringify(q)); } catch(_) {}
    _queueToast('Playing next: ' + (track.title || ''));
  };

  // Append track to the end of the queue
  window._queueAddToEnd = function(track) {
    var q = null;
    try { q = JSON.parse(sessionStorage.getItem('td:queue') || 'null'); } catch(_) {}
    if (!q || !_bgAudio || !_bgAudio.src) {
      if (window._cardPlayAudio) window._cardPlayAudio(track.streamUrl, track.watchUrl, track.title, track.artist || '', track.art || '');
      return;
    }
    q.push(track);
    try { sessionStorage.setItem('td:queue', JSON.stringify(q)); } catch(_) {}
    _queueToast('Added to queue: ' + (track.title || ''));
  };

  // Re-init after every htmx content swap (URL/path may have changed)
  document.body.addEventListener('htmx:afterSettle', _mpInit);

  // ── htmx boost config: exclude /watch/ and /admin from AJAX navigation ──
  // Only applies to GET requests (link boosts). POST form submissions within
  // admin pages (e.g. hide/show, bulk actions) must go through htmx normally —
  // intercepting them converts the POST to a GET navigation and breaks them.
  document.body.addEventListener('htmx:configRequest', function(e) {
    if ((e.detail.verb || 'get').toLowerCase() !== 'get') return;
    var rawPath = (e.detail.path || '');
    var pathname;
    try { pathname = new URL(rawPath, location.origin).pathname; } catch(_) { pathname = rawPath; }
    // Watch + admin pages need full page loads (complex JS that relies on DOMContentLoaded).
    // Stream URLs (/{hash}{id}) must not be AJAX-fetched — they return binary audio/video.
    if (pathname.startsWith('/watch/') || pathname.startsWith('/admin') ||
        /^\/[A-Za-z0-9_-]*[A-Za-z_-]\d+$/.test(pathname)) {
      e.preventDefault();
      window.location.href = rawPath;
    }
  });

  // Hand off audio to bgAudio before every htmx content swap so music
  // continues while browsing (pagehide doesn't fire on AJAX navigation).
  document.body.addEventListener('htmx:beforeSwap', function() {
    if (typeof window._handoffAudioToBg === 'function') {
      window._handoffAudioToBg();
    }
  });

  // Scroll to top after each AJAX navigation (htmx preserves scroll position
  // by default, which leaves users mid-page on the new content).
  document.body.addEventListener('htmx:afterSettle', function() {
    window.scrollTo(0, 0);
  });

  // Hide hero section when URL has active filters (search/year/quality/tag).
  // The hero is outside #grid so filter swaps don't remove it — hide via JS.
  function _syncHeroVisibility() {
    var hero = document.getElementById('hero-section');
    if (!hero) return;
    var sp = new URLSearchParams(location.search);
    var hasFilter = sp.get('q') || sp.get('tag') || sp.get('year') || sp.get('quality');
    hero.style.display = hasFilter ? 'none' : '';
  }
  document.body.addEventListener('htmx:afterSettle', _syncHeroVisibility);
  _syncHeroVisibility(); // run on initial load too

  // PWA install banner — only surfaces after 3+ visits, once per session,
  // and with a 10s delay so it doesn't interrupt on landing.
  var _prompt = null;
  var DISMISS = 'td:pwa-dismiss';
  var VISITS = 'td:visits';
  var SESSION = 'td:pwa-shown';

  // Track visits (increment once per page load).
  var visits = parseInt(localStorage.getItem(VISITS) || '0', 10) + 1;
  try { localStorage.setItem(VISITS, visits); } catch (_) {}

  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    if (localStorage.getItem(DISMISS)) return;  // permanently dismissed
    if (visits < 3) return;                      // not enough engagement
    if (sessionStorage.getItem(SESSION)) return; // already shown this tab
    _prompt = e;
    // Delay 10s so the user can settle in before seeing the prompt.
    setTimeout(function () {
      if (!_prompt) return;
      try { sessionStorage.setItem(SESSION, '1'); } catch (_) {}
      var b = document.getElementById('_pwa-banner');
      if (b) b.style.display = 'flex';
    }, 10000);
  });
  window.addEventListener('appinstalled', function () {
    var b = document.getElementById('_pwa-banner');
    if (b) b.style.display = 'none';
    _prompt = null;
  });
  window._pwaBannerInstall = function () {
    if (!_prompt) return;
    _prompt.prompt();
    _prompt.userChoice.then(function () {
      _prompt = null;
      var b = document.getElementById('_pwa-banner');
      if (b) b.style.display = 'none';
    });
  };
  window._pwaBannerDismiss = function () {
    localStorage.setItem(DISMISS, '1');
    var b = document.getElementById('_pwa-banner');
    if (b) b.style.display = 'none';
  };
})();

function globalSearch() {
  return {
    open: false,
    q: '',
    items: [],
    active: -1,
    _t: null,
    init() {
      window.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault(); this.toggle(); return;
        }
        if (e.key === '/' && !['INPUT','TEXTAREA','SELECT'].includes(
            (document.activeElement || {}).tagName || '')) {
          e.preventDefault(); this.toggle();
        }
      });
    },
    toggle() {
      this.open = !this.open;
      if (this.open) this.$nextTick(() => { if (this.$refs.inp) this.$refs.inp.focus(); });
      else { this.q = ''; this.items = []; this.active = -1; }
    },
    close() { this.open = false; this.q = ''; this.items = []; this.active = -1; },
    schedule() {
      clearTimeout(this._t);
      const v = this.q.trim();
      if (!v) { this.items = []; this.active = -1; return; }
      this._t = setTimeout(async () => {
        try {
          const r = await fetch('/search/suggest?q=' + encodeURIComponent(v) + '&limit=8');
          if (r.ok) { this.items = await r.json(); this.active = -1; }
        } catch (_) {}
      }, 150);
    },
    move(d) {
      if (!this.items.length) return;
      this.active = (this.active + d + this.items.length) % this.items.length;
    },
    confirm() {
      if (this.active >= 0 && this.active < this.items.length) {
        window.location = this.items[this.active].url;
      } else if (this.q.trim()) {
        window.location = '/?q=' + encodeURIComponent(this.q.trim());
      }
    },
  };
}
