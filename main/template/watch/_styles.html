  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <style>
    :root {
      --plyr-color-main: #f97316;
      --plyr-video-background: #000;
      --plyr-menu-background: rgba(15, 17, 21, 0.97);
      --plyr-menu-color: #e2e8f0;
    }

    /* Plyr should fill the aspect-video container, not collapse to intrinsic size. */
    .plyr { width: 100%; height: 100%; }
    .plyr--video .plyr__video-wrapper { height: 100%; }
    .plyr--video video { width: 100%; height: 100%; object-fit: contain; }

    /* Hide the bare <video> until Plyr wraps it so any pre-wrap state is
       never painted. Once Plyr.setup() runs it inserts .plyr / .plyr__
       video-wrapper between the .aspect-video container and the <video>,
       so this direct-child selector stops matching and the video becomes
       visible without needing a higher-specificity override. */
    .aspect-video > video.player { visibility: hidden; }

    /* Flip card for lyrics */
    .flip-card { perspective: 1000px; }
    .flip-card-inner {
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .flip-card-inner.flipped { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .flip-card-back { transform: rotateY(180deg); position: absolute; inset: 0; }

    /* Audio: hide Plyr's default controls bar — custom controls rendered below */
    /* Custom seek slider */
    /* Overlay play button — always 64px circle, icon shifted right for optical centre */
    .plyr__control--overlaid {
      width:  64px !important;
      height: 64px !important;
      padding: 0 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
    .plyr__control--overlaid svg {
      width: 28px !important;
      height: 28px !important;
      transform: translateX(3px);
    }

    /* Video: larger touch targets on mobile */
    @media (max-width: 640px) {
      .plyr--video .plyr__controls { padding: 8px 8px 12px; gap: 0; }
      /* Exclude the overlay button — it lives inside the video, not the bar */
      .plyr--video .plyr__control:not(.plyr__control--overlaid) { padding: 8px 7px; min-width: 36px; }
      .plyr--video .plyr__progress__container { flex: 1 1 auto; min-width: 0; }
      .plyr--video .plyr__volume input[type=range] { display: none; }
    }
  </style>
