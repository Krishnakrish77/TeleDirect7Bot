<!DOCTYPE html>
<html lang="en" class="h-full dark">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    {% block head_extra %}{% endblock %}
    <title>{% block title %}TeleDirect{% endblock %}</title>

    <link rel="stylesheet" href="/static/tailwind.css?v=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

    <script defer src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://unpkg.com/alpinejs@3.13.10/dist/cdn.min.js"></script>
  </head>

  <body
    class="min-h-full font-sans antialiased text-slate-100 bg-ink-900
           selection:bg-brand-500/40 selection:text-white"
  >
    <main class="min-h-screen flex flex-col items-center px-4 pt-4 pb-10 sm:pt-6 sm:pb-16">
      {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
