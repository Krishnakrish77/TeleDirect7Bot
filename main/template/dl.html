{% extends "base.html" %}

{% block title %}{{ heading }}{% endblock %}

{% block head_extra %}
  <meta
    property="og:image"
    content="https://winaero.com/blog/wp-content/uploads/2018/12/file-explorer-folder-libraries-icon-18298.png"
    itemprop="thumbnailUrl"
  />
{% endblock %}

{% block content %}
  <div class="w-full max-w-xl">
    <div class="rounded-2xl border border-white/10 bg-white/5 backdrop-blur-md
                shadow-2xl shadow-black/40 overflow-hidden">
      <div class="px-8 pt-8 pb-6 border-b border-white/5">
        <p class="text-xs uppercase tracking-[0.18em] text-brand-400/80">TeleDirect</p>
        <h1 class="mt-2 text-2xl sm:text-3xl font-semibold text-white leading-tight">
          Your file is ready
        </h1>
      </div>

      <div class="px-8 py-6">
        <div class="flex items-start gap-4">
          <div class="shrink-0 grid place-items-center w-12 h-12 rounded-xl
                      bg-brand-500/15 ring-1 ring-brand-400/30 text-brand-300">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m6 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
            </svg>
          </div>
          <div class="min-w-0 flex-1">
            <h2 class="text-lg sm:text-xl font-semibold text-white break-all leading-snug">
              {{ file_name }}
            </h2>
            <p class="mt-1 text-sm text-slate-400">{{ file_size }}</p>
          </div>
        </div>
      </div>

      <div class="px-8 pb-8">
        <a href="{{ src }}" download
           class="group inline-flex w-full items-center justify-center gap-2
                  rounded-xl px-5 py-3 font-semibold text-white
                  bg-gradient-to-br from-brand-400 to-brand-600
                  shadow-glow ring-1 ring-brand-400/40
                  hover:from-brand-300 hover:to-brand-500
                  active:scale-[0.99] transition">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" class="w-5 h-5
               group-hover:translate-y-0.5 transition">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
          </svg>
          Download
        </a>
      </div>
    </div>

    <p class="mt-6 text-center text-xs text-slate-500">
      Powered by Telegram • @TeleDirect7Bot
    </p>
  </div>
{% endblock %}
