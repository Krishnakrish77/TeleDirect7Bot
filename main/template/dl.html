{% extends "base.html" %}

{% block title %}{{ heading }}{% endblock %}

{% block head_extra %}
  <meta
    property="og:image"
    content="https://winaero.com/blog/wp-content/uploads/2018/12/file-explorer-folder-libraries-icon-18298.png"
    itemprop="thumbnailUrl"
  />
{% endblock %}

{% block content %}
  <div class="w-full max-w-2xl">
    <a href="/"
       class="inline-flex items-center gap-1 text-sm text-slate-400
              hover:text-brand-300 transition-colors mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" class="w-4 h-4">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 19.5 8.25 12l7.5-7.5"/>
      </svg>
      Back to library
    </a>
    <div class="text-center">
    <h1 class="text-3xl sm:text-4xl font-bold text-white tracking-tight">TeleDirect</h1>
    <p class="mt-2 text-sm sm:text-base text-slate-400 break-all px-2">
      {{ file_name }} <span class="text-slate-500">·</span> {{ file_size }}
    </p>

    <div class="mt-10 rounded-2xl bg-ink-800/60 border border-white/5 px-6 py-10 sm:px-10 sm:py-12">
      <div class="grid place-items-center w-16 h-16 mx-auto rounded-2xl
                  bg-brand-500/10 ring-1 ring-brand-400/30 text-brand-300">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.8" class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m6 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
      </div>

      <p class="mt-6 text-slate-300">Your file is ready to download.</p>

      <a href="{{ download_src }}" download
         class="mt-8 inline-flex items-center justify-center gap-2
                rounded-lg px-6 py-3 font-semibold text-white
                bg-brand-500 hover:bg-brand-600 active:bg-brand-700
                focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-300
                transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
        </svg>
        Download
      </a>
    </div>

    <p class="mt-8 text-xs text-slate-500">Powered by Telegram · @TeleDirect7Bot</p>
    </div>
  </div>
{% endblock %}
